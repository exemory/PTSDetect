#   tags:
#     include:
#       - v*

pr:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: docker-hub-credentials
  - group: azure-credentials
  - group: azure-resoures
  - group: ptsdetect-api
  - name: image-version
    value: test

stages:
  - stage: Build and publish Docker image
    jobs:
      - job: Build and publish docker image
        steps:
          - checkout: self
            displayName: "Checkout repository"

          - script: |
              docker build -t $(ptsdetectApiImageName):latest -t $(ptsdetectApiImageName):$(version) .
            workingDirectory: backend
            displayName: "Build and publish Docker image"

          - script: |
              docker login -u $(dockerhub-username) -p $(dockerhub-password)
            displayName: "Login to Docker Hub"

          - script: |
              docker push $(ptsdetectApiImageName)
            displayName: "Push Docker image to Docker Hub"

          - script: |
              docker logout
            displayName: "Logout from Docker Hub"

  - stage: Deploy to Azure
    jobs:
      - job: Deploy to AKS
        steps:
          - checkout: self
            displayName: "Checkout repository"

          - script: |
              az login --service-principal -u $(service-principal-id) -p $(service-principal-secret) --tenant $(tenant-id)
            displayName: "Login to Azure"

          - script: |
              az aks get-credentials --resource-group $(resource-group) --name $(aks-name)
            displayName: "Get AKS credentials"

          - script: |
              kubectl apply -f k8s
            displayName: "Deploy PTSDetect API to AKS"

          - script: |
              kubectl get pods
            displayName: "Get all pods"

          - script: |
              kubectl config get-contexts
            displayName: "Get all contexts"

          #logout from kubectl
          #think about it
          # - script: |
          #     kubectl config unset users.clusterUser_$(resource-group)_$(aks-name)
          #   displayName: "Logout from AKS"

          - script: |
              az logout
            displayName: "Logout from Azure"
